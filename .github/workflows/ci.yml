name: CI — Backend + Frontend

on:
  push:
    branches: [ "dev", "feature/**" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  backend-ci:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25 (Early Access)
        uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
          cache: maven

      - name: Create application.properties for CI
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application.properties << EOF
          spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
          spring.datasource.driver-class-name=org.h2.Driver
          spring.datasource.username=sa
          spring.datasource.password=
          spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
          spring.jpa.hibernate.ddl-auto=create-drop
          spring.jpa.open-in-view=false
          jwt.secret=pickleball_ci_secret_key_minimum_32_chars_long
          jwt.expiration=86400000
          spring.servlet.multipart.max-file-size=10MB
          spring.servlet.multipart.max-request-size=50MB
          EOF

      - name: Build with Maven
        run: mvn clean compile -q

      - name: Run tests
        run: mvn test -q

      - name: Package JAR
        run: mvn package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pickleball-backend-jar
          path: target/*.jar
          retention-days: 5

  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Create .env for CI
        run: |
          echo "VITE_API_URL=http://localhost:8080" > .env

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pickleball-frontend-dist
          path: dist/
          retention-days: 5