spring.application.name=pickleball-backend
# ?? DATABASE ??????????????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/pickleball_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA / HIBERNATE ???????????????????????????????????????????
# update = JPA automatically creates/updates tables based on your Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? JWT ???????????????????????????????????????????????????????
# Secret key MUST be at least 32 characters long
jwt.secret=pickleball_super_secret_key_minimum_32_chars
# 86400000 milliseconds = 24 hours token validity
jwt.expiration=86400000

# ?? SERVER ????????????????????????????????????????????????????
server.port=8080

# ?? FILE UPLOAD ???????????????????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ?? CORS (allow React frontend to call this backend) ??????????
spring.web.cors.allowed-origins=http://localhost:3000